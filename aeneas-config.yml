# Aeneas extraction configuration

aeneas:
  commit: "1180be60" # pinned commit hash
  repo: "https://github.com/AeneasVerif/aeneas.git"

# Upstream Rust crate we are verifying
upstream:
  repo: "https://github.com/signalapp/libsignal"
  commit: "0a58e80b"

crate:
  dir: "rust" # path to Rust crate (workspace root for core)
  name: "libsignal_core" # crate name (underscored, as Charon outputs it)

charon:
  preset: "aeneas"
  hide_marker_traits: true
  cargo_args: ["-p", "libsignal-core", "--features", "extraction"]
  start_from:
    - "libsignal_core"
  exclude:
    - "libsignal_core::{impl core::fmt::Debug for _}"
    - "libsignal_core::{impl core::fmt::Display for _}"
    - "libsignal_core::_::{impl core::fmt::Debug for _}"
    - "libsignal_core::_::{impl core::fmt::Display for _}"
    - "libsignal_core::_::_::{impl core::fmt::Debug for _}"
    - "libsignal_core::_::_::{impl core::fmt::Display for _}"
    - "libsignal_core::{impl core::error::Error for _}"
    - "libsignal_core::_::{impl core::error::Error for _}"
    - "libsignal_core::address::ServiceId::parse_from_service_id_string" # uses str::Pattern (GAT, unsupported)
    - "libsignal_core::address::SpecificServiceId::parse_from_service_id_string"
    - "libsignal_core::address::ServiceId::service_id_string" # uses format! macro
    - "libsignal_core::address::SpecificServiceId::service_id_string"
    - "libsignal_core::address::{impl rand::distr::Distribution for _}" # mutually recursive rand traits
    - "libsignal_core::address::ServiceId::to_protocol_address" # calls service_id_string
    - "core::str::pattern" # GATs unsupported by Aeneas
    - "core::str::_::{impl core::str::pattern::Pattern for _}"
    - "rand::distr::uniform" # mutually recursive traits
    - "libsignal_core::curve::curve25519" # Charon panic: non-array type in array constant in curve25519_dalek
    - "zerocopy" # raw pointer ops, GATs unsupported
    - "log"
  opaque: []

aeneas_args:
  options:
    - split-files
  dest: "." # output directory (project root)
  subdir: "Libsignal/Code" # sub-folder for files (sets import paths to Libsignal.Code.*)

# Post-extraction find/replace applied to generated Lean files.
tweaks:
  files: []
  substitutions: []
