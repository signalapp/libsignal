# Aeneas extraction configuration — combined (signal-crypto + libsignal-core)
#
# Extracts signal-crypto as the target crate, with libsignal-core fully
# transparent (bodies extracted) rather than opaque signatures only.

aeneas:
  commit: "1180be60"
  repo: "https://github.com/AeneasVerif/aeneas.git"

upstream:
  repo: "https://github.com/signalapp/libsignal"
  commit: "0a58e80b"

crate:
  dir: "rust"
  name: "signal_crypto"

charon:
  preset: "aeneas"
  hide_marker_traits: true
  cargo_args: ["-p", "signal-crypto", "--features", "extraction"]
  start_from_pub: true
  start_from:
    # Core free functions
    - "libsignal_core::try_scoped"
    - "libsignal_core::derive_arrays"
    - "libsignal_core::try_derive_arrays"
    - "libsignal_core::version::VERSION"
    # Core inherent methods (using _::method workaround for impl blocks)
    - "libsignal_core::e164::_::new"
    - "libsignal_core::e164::_::to_be_bytes"
    - "libsignal_core::e164::_::from_be_bytes"
    - "libsignal_core::address::_::new"
    - "libsignal_core::address::_::kind"
    - "libsignal_core::address::_::service_id_binary"
    - "libsignal_core::address::_::service_id_fixed_width_binary"
    - "libsignal_core::address::_::parse_from_service_id_binary"
    - "libsignal_core::address::_::raw_uuid"
    - "libsignal_core::address::_::name"
    - "libsignal_core::address::_::device_id"
    - "libsignal_core::address::_::new_nonzero"
    - "libsignal_core::address::_::from_uuid_bytes"
    - "libsignal_core::address::_::from_uuid"
    # Curve: PublicKey
    - "libsignal_core::curve::_::deserialize"
    - "libsignal_core::curve::_::serialize"
    - "libsignal_core::curve::_::key_type"
    - "libsignal_core::curve::_::public_key"
    - "libsignal_core::curve::_::public_key_bytes"
    - "libsignal_core::curve::_::from_djb_public_key_bytes"
    - "libsignal_core::curve::_::verify_signature"
    - "libsignal_core::curve::_::verify_signature_for_multipart_message"
    - "libsignal_core::curve::_::is_canonical"
    # Curve: PrivateKey
    - "libsignal_core::curve::_::calculate_signature"
    - "libsignal_core::curve::_::calculate_signature_for_multipart_message"
    - "libsignal_core::curve::_::calculate_agreement"
    # Curve: KeyPair
    - "libsignal_core::curve::_::generate"
    - "libsignal_core::curve::_::from_public_and_private"
  include:
    - "libsignal_core"
  exclude:
    # Debug/Display/Error impls
    - "signal_crypto::{impl core::fmt::Debug for _}"
    - "signal_crypto::{impl core::fmt::Display for _}"
    - "signal_crypto::_::{impl core::fmt::Debug for _}"
    - "signal_crypto::_::{impl core::fmt::Display for _}"
    - "signal_crypto::_::_::{impl core::fmt::Debug for _}"
    - "signal_crypto::_::_::{impl core::fmt::Display for _}"
    - "signal_crypto::{impl core::error::Error for _}"
    - "signal_crypto::_::{impl core::error::Error for _}"
    - "libsignal_core::{impl core::fmt::Debug for _}"
    - "libsignal_core::{impl core::fmt::Display for _}"
    - "libsignal_core::_::{impl core::fmt::Debug for _}"
    - "libsignal_core::_::{impl core::fmt::Display for _}"
    - "libsignal_core::_::_::{impl core::fmt::Debug for _}"
    - "libsignal_core::_::_::{impl core::fmt::Display for _}"
    - "libsignal_core::{impl core::error::Error for _}"
    - "libsignal_core::_::{impl core::error::Error for _}"
    # libsignal-core specific excludes
    - "libsignal_core::address::ServiceId::parse_from_service_id_string"
    - "libsignal_core::address::SpecificServiceId::parse_from_service_id_string"
    - "libsignal_core::address::ServiceId::service_id_string"
    - "libsignal_core::address::SpecificServiceId::service_id_string"
    - "libsignal_core::address::{impl rand::distr::Distribution for _}"
    - "libsignal_core::address::ServiceId::to_protocol_address"
    - "libsignal_core::curve::curve25519" # Charon panic in curve25519_dalek
    # signal-crypto specific excludes
    - "signal_crypto::hpke" # complex external crypto
    # External crate internals
    - "core::str::pattern"
    - "core::str::_::{impl core::str::pattern::Pattern for _}"
    - "rand::distr::uniform"
    - "zerocopy"
    - "log"
  opaque: []

aeneas_args:
  options:
    - split-files
  dest: "."
  subdir: "Libsignal/Code"

tweaks:
  files: []
  substitutions: []
